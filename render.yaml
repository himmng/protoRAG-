services:
  - type: web
    name: protorag-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PROTORAG_API_TOKEN
        generateValue: true
    disk:
      name: protorag-data
      mountPath: /app/data
      sizeGB: 5
