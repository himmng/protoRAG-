<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>protoRAG⁺</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='20 15 60 60'%3E%3Cpath d='M50 15C58 15 65 22 65 30C73 30 80 37 80 45C80 53 73 60 65 60C65 68 58 75 50 75C42 75 35 68 35 60C27 60 20 53 20 45C20 37 27 30 35 30C35 22 42 15 50 15Z' fill='%23CD5C5C'/%3E%3Ccircle cx='50' cy='45' r='8' fill='%23CD5C5C' stroke='white' stroke-width='2'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'indian-red': '#CD5C5C',
                    }
                }
            }
        }
    </script>
    <style>
        :root { --indian-red: #CD5C5C; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }

        body, aside, main, div, button, textarea {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        #sidebar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        .sidebar-expanded { width: 280px; }
        .sidebar-collapsed { width: 72px; }

        .logo-container { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .sidebar-collapsed .logo-container { transform: rotate(180deg); }
        
        .arrow-icon { transition: transform 0.4s ease; }
        .sidebar-collapsed .arrow-icon { transform: rotate(180deg); }

        .nav-text { 
            transition: opacity 0.2s ease, transform 0.2s ease;
            white-space: nowrap;
        }
        .sidebar-collapsed .nav-text { opacity: 0; transform: translateX(-10px); pointer-events: none; }
        
        .sidebar-collapsed .new-chat-btn span { display: none; }
        .sidebar-collapsed .new-chat-btn { justify-content: center; padding: 10px; }
        .sidebar-collapsed .bottom-btn span { display: none; }
        .sidebar-collapsed .bottom-btn { justify-content: center; }

        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .animate-fade-out { animation: fadeOut 0.2s ease-out forwards; }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .provider-hint {
            font-size: 10px;
            font-family: monospace;
            background: rgba(205,92,92,0.1);
            color: #CD5C5C;
            border-radius: 6px;
            padding: 2px 7px;
            margin-top: 5px;
            display: inline-block;
        }
        .dark .provider-hint { background: rgba(205,92,92,0.18); }
    </style>
</head>
<body class="bg-white dark:bg-slate-950 text-gray-900 dark:text-slate-100 font-sans h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-expanded relative z-30 h-full bg-gray-50 dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 flex flex-col shadow-sm">
        <div class="p-4 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between overflow-hidden">
            <div class="flex items-center gap-3 cursor-pointer" onclick="toggleSidebar()">
                <div class="logo-container flex-shrink-0">
                    <svg width="36" height="36" viewBox="0 0 100 100" fill="none">
                        <path d="M50 15C58 15 65 22 65 30C73 30 80 37 80 45C80 53 73 60 65 60C65 68 58 75 50 75C42 75 35 68 35 60C27 60 20 53 20 45C20 37 27 30 35 30C35 22 42 15 50 15Z" fill="#CD5C5C"/>
                        <circle cx="50" cy="45" r="8" fill="#CD5C5C" stroke="white" stroke-width="2"/>
                    </svg>
                </div>
                <span class="nav-text font-bold text-xl tracking-tight text-[#CD5C5C]">protoRAG⁺</span>
            </div>
            <button onclick="toggleSidebar()" class="nav-text p-1.5 rounded-lg text-gray-400 hover:bg-gray-200 dark:hover:bg-slate-800 transition-colors">
                <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="11 17 6 12 11 7"></polyline>
                    <polyline points="18 17 13 12 18 7"></polyline>
                </svg>
            </button>
        </div>

        <div class="p-3">
            <button onclick="createNewSession()" class="new-chat-btn w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-700 dark:text-slate-200 py-2.5 px-4 rounded-xl hover:shadow-md dark:hover:bg-slate-700 flex items-center gap-3 transition-all font-medium">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span class="nav-text">New Chat</span>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 space-y-1 py-2" id="session-list"></div>
        
        <div class="p-3 border-t border-gray-200 dark:border-slate-800">
            <button onclick="toggleSettingsModal()" class="bottom-btn flex items-center gap-4 w-full p-2.5 rounded-xl text-gray-600 dark:text-slate-400 hover:bg-gray-200 dark:hover:bg-slate-800 transition-all overflow-hidden group">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 group-hover:rotate-90 transition-transform duration-500">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span class="nav-text text-sm font-medium">Settings</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative bg-white dark:bg-slate-950">
        <div class="absolute top-4 right-6 z-40 flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="p-2.5 bg-white/80 dark:bg-slate-800/80 backdrop-blur border border-gray-200 dark:border-slate-700 rounded-full shadow-lg hover:scale-110 transition-all">
                <svg id="theme-sun" class="block dark:hidden text-orange-500" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="theme-moon" class="hidden dark:block text-blue-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>

        <div id="floating-doc-bar" class="hidden absolute top-4 left-6 z-30 min-w-[320px] max-w-[calc(100%-180px)]">
            <div class="bg-white/95 dark:bg-slate-800/95 backdrop-blur-md border border-gray-200 dark:border-slate-700 rounded-2xl shadow-xl p-2 flex flex-col gap-2" id="doc-pills"></div>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 pt-24">
            <div class="max-w-3xl mx-auto space-y-6 pb-44" id="messages"></div>
        </div>

        <div class="fixed bottom-0 w-full bg-gradient-to-t from-white dark:from-slate-950 via-white dark:via-slate-950 to-transparent pt-12 pb-4 px-4">
            <div class="max-w-6xl ml-4 md:ml-40"> 
                <div class="flex flex-col md:flex-row items-stretch md:items-end justify-start gap-3">
                    <button onclick="document.getElementById('file-input').click()" 
                            class="flex items-center justify-center gap-3 px-4 py-3 mb-1 bg-white dark:bg-slate-900 text-gray-600 dark:text-slate-400 rounded-2xl border border-gray-300 dark:border-slate-700 shadow-sm min-w-[180px] hover:text-indian-red transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="13" x2="12" y2="17"></line><line x1="10" y1="15" x2="14" y2="15"></line></svg>
                        <span class="text-sm font-semibold">Upload Document</span>
                    </button>

                    <form id="chat-form" class="flex-1 relative flex items-end bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-700 rounded-[2rem] shadow-2xl px-4 py-2">
                        <textarea id="message-input" rows="1" placeholder="Type a message..." 
                                class="flex-1 max-h-48 py-3 px-2 bg-transparent outline-none resize-none text-gray-800 dark:text-slate-100"></textarea>
                        <button type="submit" class="p-2.5 bg-indian-red text-white rounded-full hover:scale-105 transition-all shadow-lg mb-1">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <input type="file" id="file-input" class="hidden" onchange="uploadFile(this.files[0])">
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-lg shadow-2xl border border-gray-200 dark:border-slate-800 overflow-hidden">
            <div class="p-6 border-b border-gray-100 dark:border-slate-800 flex justify-between items-center">
                <h2 class="text-xl font-bold">Settings</h2>
                <button onclick="toggleSettingsModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            
            <div class="p-6 space-y-5 max-h-[70vh] overflow-y-auto no-scrollbar">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Provider</label>
                    <select id="config-provider" onchange="onProviderChange(this.value)" class="w-full bg-gray-50 dark:bg-slate-800 p-3 rounded-xl outline-none border border-transparent focus:border-indian-red text-sm">
                        <option value="ollama">Ollama</option>
                        <option value="lmstudio">LM Studio</option>
                        <option value="openai">OpenAI</option>
                        <option value="litellm">LiteLLM</option>
                        <option value="custom">Custom</option>
                    </select>
                    <div id="provider-hint" class="provider-hint"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">LLM Model</label>
                        <input id="config-model" type="text" class="w-full bg-gray-50 dark:bg-slate-800 p-3 rounded-xl outline-none border border-transparent focus:border-indian-red text-sm">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Embedding Model</label>
                        <input id="config-embed" type="text" class="w-full bg-gray-50 dark:bg-slate-800 p-3 rounded-xl outline-none border border-transparent focus:border-indian-red text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Base URL</label>
                    <input id="config-url" type="text" class="w-full bg-gray-50 dark:bg-slate-800 p-3 rounded-xl outline-none border border-transparent focus:border-indian-red text-sm font-mono">
                    <div id="url-hint" class="text-[10px] text-gray-400 mt-1 ml-1"></div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 ml-1">API Key</label>
                    <input id="config-key" type="password" class="w-full bg-gray-50 dark:bg-slate-800 p-3 rounded-xl outline-none border border-transparent focus:border-indian-red text-sm">
                </div>
            </div>

            <div class="p-6 bg-gray-50 dark:bg-slate-800/50 flex justify-end gap-3 border-t border-gray-100 dark:border-slate-800">
                <button onclick="toggleSettingsModal()" class="px-5 py-2.5 font-bold text-sm text-gray-500">Cancel</button>
                <button onclick="saveSettings()" class="bg-indian-red text-white px-8 py-2.5 rounded-xl font-bold shadow-lg text-sm">Save</button>
            </div>
        </div>
    </div>

    <script>
        const PROVIDER_DEFAULTS = {
            ollama:   { base_url: 'http://localhost:11434', api_key: 'none', hint: 'Standard Ollama (Backend auto-adds /v1)' },
            lmstudio: { base_url: 'http://localhost:1234', api_key: 'lm-studio', hint: 'LM Studio (Backend auto-adds /v1)' },
            openai:   { base_url: 'https://api.openai.com/v1', api_key: '', hint: 'Real OpenAI endpoint' },
            litellm:  { base_url: 'http://localhost:4000', api_key: 'any', hint: 'LiteLLM Proxy root' },
            custom:   { base_url: '', api_key: '', hint: 'Manual override' }
        };

        let currentSessionId = localStorage.getItem('last_session_id') || crypto.randomUUID();
        const config = JSON.parse(localStorage.getItem('app_config')) || {
            data_dir: './data',
            provider: 'ollama',
            base_url: 'http://localhost:11434',
            api_key: 'none',
            model_name: 'gemma:2b',
            embedding_model: 'nomic-embed-text'
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadSessions();
            loadSessionHistory(currentSessionId);
            updateConfigUI();
            
            document.getElementById('chat-form').onsubmit = (e) => {
                e.preventDefault();
                const input = document.getElementById('message-input');
                if (input.value.trim()) sendMessage(input.value.trim());
            };
        });

        function updateConfigUI() {
            document.getElementById('config-provider').value = config.provider;
            document.getElementById('config-url').value = config.base_url;
            document.getElementById('config-key').value = config.api_key;
            document.getElementById('config-model').value = config.model_name;
            document.getElementById('config-embed').value = config.embedding_model;
            onProviderChange(config.provider, false);
        }

        function onProviderChange(provider, updateInputs = true) {
            const def = PROVIDER_DEFAULTS[provider] || PROVIDER_DEFAULTS.custom;
            document.getElementById('provider-hint').textContent = def.hint;
            if (updateInputs) {
                document.getElementById('config-url').value = def.base_url;
                document.getElementById('config-key').value = def.api_key;
            }
        }

        function saveSettings() {
            config.provider = document.getElementById('config-provider').value;
            config.base_url = document.getElementById('config-url').value;
            config.api_key = document.getElementById('config-key').value;
            config.model_name = document.getElementById('config-model').value;
            config.embedding_model = document.getElementById('config-embed').value;
            localStorage.setItem('app_config', JSON.stringify(config));
            toggleSettingsModal();
        }

        async function sendMessage(text) {
            const msgInput = document.getElementById('message-input');
            msgInput.value = '';
            
            appendMessage('user', text);
            const aiMsgEl = appendMessage('assistant', '<span class="loading-dots">Thinking</span>');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        message: text,
                        config: config
                    })
                });

                const reader = response.body.getReader();
                let fullText = '';
                aiMsgEl.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = new TextDecoder().decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(data);
                                fullText += parsed.content;
                                aiMsgEl.innerHTML = DOMPurify.sanitize(marked.parse(fullText));
                            } catch {}
                        }
                    }
                }
            } catch (e) {
                aiMsgEl.textContent = "Error connecting to backend.";
            }
        }

        async function uploadFile(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('session_id', currentSessionId);
            formData.append('provider', config.provider);
            formData.append('base_url', config.base_url);
            formData.append('api_key', config.api_key);
            formData.append('model_name', config.model_name);
            formData.append('embedding_model', config.embedding_model);
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.status === 'success') {
                    loadSessionHistory(currentSessionId);
                    loadSessions();
                }
            } catch (e) { console.error(e); }
        }

        async function loadSessions() {
            const res = await fetch(`/api/sessions?data_dir=${config.data_dir}`);
            const data = await res.json();
            const list = document.getElementById('session-list');
            list.innerHTML = data.sessions.map(s => `
                <div class="p-2 rounded-lg cursor-pointer hover:bg-gray-200 dark:hover:bg-slate-800 ${s.id === currentSessionId ? 'bg-gray-200 dark:bg-slate-800 border-l-2 border-indian-red' : ''}" onclick="switchSession('${s.id}')">
                    <div class="text-sm font-medium truncate">${s.preview}</div>
                </div>
            `).join('');
        }

        async function loadSessionHistory(sid) {
            currentSessionId = sid;
            localStorage.setItem('last_session_id', sid);
            const res = await fetch(`/api/sessions/${sid}?data_dir=${config.data_dir}`);
            const data = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            data.history.forEach(m => appendMessage(m.role, m.content));
            updateDocBar(data.documents);
        }

        function switchSession(sid) {
            loadSessionHistory(sid);
            loadSessions();
        }

        function createNewSession() {
            switchSession(crypto.randomUUID());
        }

        function appendMessage(role, content) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl ${role === 'user' ? 'bg-indian-red/10 ml-12' : 'bg-gray-100 dark:bg-slate-900 mr-12'}`;
            div.innerHTML = role === 'assistant' ? DOMPurify.sanitize(marked.parse(content)) : content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function updateDocBar(docs) {
            const bar = document.getElementById('floating-doc-bar');
            const pills = document.getElementById('doc-pills');
            if (!docs?.length) { bar.classList.add('hidden'); return; }
            bar.classList.remove('hidden');
            pills.innerHTML = docs.map(d => `<div class="bg-white dark:bg-slate-700 p-2 rounded-lg text-xs border border-gray-200 dark:border-slate-600 truncate">${d}</div>`).join('');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-collapsed'); }
        function toggleSettingsModal() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
